<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>بطاقة تهنئة العيد – النصيان لتقنية المعلومات</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Almarai:wght@300;400;700;800&family=Amiri:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="wrapper">

    <!-- ── HEADER ── -->
    <header class="site-header">
      <img src="assets/logo.png" alt="النصيان لتقنية المعلومات" class="logo" />
    </header>

    <!-- ── INPUT PANEL ── -->
    <section class="panel" id="inputPanel">
      <h1 class="panel-title">بطاقة تهنئة عيد الفطر المبارك</h1>
      <p class="panel-desc">أدخل اسمك لتوليد بطاقة تهنئة خاصة بك</p>

      <div class="field-wrap">
        <input
          type="text"
          id="nameField"
          class="name-input"
          placeholder="اكتب اسمك هنا…"
          maxlength="40"
          autocomplete="off"
          dir="rtl"
        />
      </div>

      <p class="field-error" id="fieldError">يرجى إدخال اسمك أولاً</p>

      <button class="btn-primary" id="showBtn">عرض البطاقة</button>
    </section>

    <!-- ── CARD RESULT ── -->
    <section class="result" id="resultPanel">

      <!-- Visual card (HTML overlay) -->
      <div class="card-wrap">
        <div class="card-frame" id="cardFrame">
          <img src="assets/card-template.png" alt="بطاقة التهنئة" class="card-bg" />
          <!-- Name sits in the blank space between the two ornamental dividers -->
          <div class="name-zone" id="nameZone">
            <span class="name-display" id="nameDisplay"></span>
          </div>
        </div>
      </div>

      <!-- Hidden canvas for PNG export -->
      <canvas id="exportCanvas" width="1116" height="2000"></canvas>

      <!-- Actions -->
      <div class="actions">
        <button class="btn-primary" id="downloadBtn">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
               fill="none" stroke="currentColor" stroke-width="2.5"
               stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="7 10 12 15 17 10"/>
            <line x1="12" y1="15" x2="12" y2="3"/>
          </svg>
          تحميل البطاقة
        </button>
        <button class="btn-ghost" id="resetBtn">تغيير الاسم</button>
      </div>

    </section>

    <footer class="site-footer">
      <p>النصيان لتقنية المعلومات والتسويق الإلكتروني</p>
    </footer>

  </div>

  <script src="card-data.js"></script>
  <script src="script.js"></script>
</body>
</html>
